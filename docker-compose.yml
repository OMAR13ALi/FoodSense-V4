services:
  metro:
    build: .
    image: foodsense-metro:dev
    container_name: foodsense-metro
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    volumes:
      - .:/app
      - metro_node_modules:/app/node_modules
    env_file:
      - .env
    environment:
      # Must be the host machine's LAN IP so Expo Go on your phone
      # can reach Metro. Set HOST_LAN_IP in .env (see SETUP.md).
      - REACT_NATIVE_PACKAGER_HOSTNAME=${HOST_LAN_IP:-0.0.0.0}
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      # File-watch polling is needed on Windows/macOS Docker Desktop
      # because bind-mount file events from the host aren't reliable.
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    tty: true
    stdin_open: true

volumes:
  metro_node_modules:
